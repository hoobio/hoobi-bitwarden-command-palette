name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the behavior.
      placeholder: |
        1. Open Command Palette
        2. Type '...'
        3. Select '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Windows Version
      description: "Run `winver` to find this."
      placeholder: "e.g. Windows 11 24H2 (Build 26100.3476)"
    validations:
      required: true

  - type: input
    id: powertoys
    attributes:
      label: PowerToys Version
      placeholder: "e.g. 0.90.0"
    validations:
      required: true

  - type: input
    id: extension
    attributes:
      label: Extension Version
      description: "Found in Settings > About, or Apps & Features."
      placeholder: "e.g. 1.7.0"
    validations:
      required: true

  - type: input
    id: bw-cli
    attributes:
      label: Bitwarden CLI Version
      description: "Run `bw --version` to find this."
      placeholder: "e.g. 2025.1.0"
    validations:
      required: false

  - type: dropdown
    id: install-source
    attributes:
      label: Installation Source
      options:
        - Microsoft Store
        - GitHub Release (MSIX)
        - Built from source
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots or relevant log output.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched [existing issues](https://github.com/hoobio/command-palette-bitwarden/issues) and this hasn't been reported yet
          required: true
        - label: I'm using the latest version of the extension
          required: false
