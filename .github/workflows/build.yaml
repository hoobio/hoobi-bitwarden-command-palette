name: Build & Release

on:
  push:
    branches: [main, dev]
    paths:
      - "**.cs"
      - "**.csproj"
      - "*.props"
      - "*.targets"
      - ".editorconfig"
      - "**/Package.appxmanifest"
      - "version.txt"
      - ".github/workflows/build.yaml"
      - "release-please-config.json"
      - ".release-please-manifest.json"
  pull_request:
    branches: [main]
    paths:
      - "**.cs"
      - "**.csproj"
      - "*.props"
      - "*.targets"
      - ".editorconfig"
      - "**/Package.appxmanifest"
      - "version.txt"
      - ".github/workflows/build.yaml"
      - "release-please-config.json"
      - ".release-please-manifest.json"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GH_PAT }}

  lint-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore -p:Platform=x64

      - name: Lint (build with TreatWarningsAsErrors)
        run: dotnet build -c Release -p:Platform=x64 --no-restore

      - name: Test with coverage
        run: >-
          dotnet test -p:Platform=x64 --no-build -c Release
          --collect:"XPlat Code Coverage"
          --results-directory ${{ github.workspace }}/coverage

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: ${{ github.workspace }}/coverage/**/coverage.cobertura.xml
          targetdir: ${{ github.workspace }}/coverage/report
          reporttypes: HtmlInline;Cobertura;MarkdownSummaryGithub

      - name: Publish coverage summary to job
        run: |
          $summary = Get-Content "${{ github.workspace }}/coverage/report/SummaryGithub.md" -Raw
          $summary | Out-File -Append $env:GITHUB_STEP_SUMMARY
        shell: pwsh

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ${{ github.workspace }}/coverage/report/

      - name: Enforce coverage threshold on changed files
        if: github.event_name == 'pull_request'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $changedFiles = git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.cs' |
            Where-Object { $_ -notmatch '\.Tests[\\/]' } |
            ForEach-Object { (Resolve-Path $_).Path }

          if (-not $changedFiles) {
            Write-Host "No C# source files changed in this PR, skipping coverage check"
            exit 0
          }

          [xml]$cobertura = Get-Content "${{ github.workspace }}/coverage/report/Cobertura.xml"
          $totalLines = 0
          $coveredLines = 0
          $fileStats = @()

          foreach ($pkg in $cobertura.coverage.packages.package) {
            foreach ($cls in $pkg.classes.class) {
              $file = $cls.filename
              if ($changedFiles | Where-Object { $file -eq $_ }) {
                $fTotal = 0; $fCovered = 0
                foreach ($line in $cls.lines.line) {
                  $totalLines++; $fTotal++
                  if ([int]$line.hits -gt 0) { $coveredLines++; $fCovered++ }
                }
                if ($fTotal -gt 0) {
                  $rel = ($file -replace [regex]::Escape("${{ github.workspace }}$([IO.Path]::DirectorySeparatorChar)"), '')
                  $pct = [math]::Round(($fCovered / $fTotal) * 100, 1)
                  $fileStats += [pscustomobject]@{ File=$rel; Covered=$fCovered; Total=$fTotal; Pct=$pct }
                }
              }
            }
          }

          if ($totalLines -eq 0) {
            Write-Host "No coverable lines found in changed files, skipping"
            exit 0
          }

          $coverage = [math]::Round(($coveredLines / $totalLines) * 100, 2)
          $threshold = 60

          # Build PR comment
          $icon = if ($coverage -ge $threshold) { ':white_check_mark:' } else { ':x:' }
          $body = "## $icon Code Coverage — Changed Files`n`n"
          $body += "| File | Lines | Coverage |`n|---|---|---|`n"
          foreach ($f in $fileStats | Sort-Object Pct -Descending) {
            $bar = if ($f.Pct -ge 80) { ':green_circle:' } elseif ($f.Pct -ge 50) { ':yellow_circle:' } else { ':red_circle:' }
            $body += "| ``$($f.File)`` | $($f.Covered)/$($f.Total) | $bar $($f.Pct)% |`n"
          }
          $body += "`n**Overall: $coverage%** ($coveredLines/$totalLines lines, threshold: $threshold%)`n"
          $body += "<!-- coverage-bot -->"

          # Upsert comment: find existing bot comment or create new
          $prNumber = "${{ github.event.pull_request.number }}"
          $existing = gh api "repos/${{ github.repository }}/issues/$prNumber/comments" --paginate --jq '.[] | select(.body | contains("<!-- coverage-bot -->")) | .id' 2>$null | Select-Object -First 1
          if ($existing) {
            gh api --method PATCH "repos/${{ github.repository }}/issues/comments/$existing" -f body=$body | Out-Null
            Write-Host "Updated existing coverage comment"
          } else {
            gh pr comment $prNumber --body $body
            Write-Host "Created coverage comment"
          }

          Write-Host "Changed-file coverage: $coverage% ($coveredLines/$totalLines lines, threshold: $threshold%)"
          if ($coverage -lt $threshold) {
            Write-Host "::error::Coverage on changed files ($coverage%) is below the $threshold% threshold"
            exit 1
          }

  build:
    needs: [lint-and-test]
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64, ARM64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content version.txt -Raw).Trim()
          "APP_VERSION=$ver.0" | Out-File -Append $env:GITHUB_ENV
          "version=$ver" | Out-File -Append $env:GITHUB_OUTPUT

      - name: Stamp Package.appxmanifest version
        shell: pwsh
        run: |
          $manifest = Resolve-Path "HoobiBitwardenCommandPaletteExtension\Package.appxmanifest"
          $content = [System.IO.File]::ReadAllText($manifest)
          $content = $content -creplace '(?<=<Identity\s[^>]*)Version="[\d.]+"', "Version=`"$env:APP_VERSION`""
          [System.IO.File]::WriteAllText($manifest, $content, [System.Text.UTF8Encoding]::new($false))

      - name: Restore
        run: dotnet restore -p:Platform=${{ matrix.platform }}

      - name: Build
        run: dotnet build -c Release -p:Platform=${{ matrix.platform }} --no-restore

      - name: Create MSIX package
        run: |
          dotnet publish -c Release -p:Platform=${{ matrix.platform }} `
            -p:AppxPackageDir=${{ github.workspace }}\AppPackages\ `
            -p:GenerateAppxPackageOnBuild=true `
            -p:AppxBundle=Never
        working-directory: HoobiBitwardenCommandPaletteExtension

      - name: Import signing certificate
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $pfxBytes = [Convert]::FromBase64String("${{ secrets.SIGNING_CERTIFICATE }}")
          $pfxPath = Join-Path $env:RUNNER_TEMP "signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
          $pwd = ConvertTo-SecureString "${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}" -AsPlainText -Force
          Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $pwd
          Remove-Item $pfxPath

      - name: Sign MSIX package
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match 'x64\\signtool' } |
            Sort-Object { [version]($_.FullName -replace '.*\\(\d+\.\d+\.\d+\.\d+)\\.*','$1') } -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          Get-ChildItem "${{ github.workspace }}\AppPackages" -Recurse -Filter *.msix | ForEach-Object {
            & $signtool sign /fd SHA256 /sha1 "${{ vars.SIGNING_CERT_THUMBPRINT }}" /td SHA256 $_.FullName
            if ($LASTEXITCODE -ne 0) { throw "Signing failed for $($_.Name)" }
          }

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: msix-${{ matrix.platform }}
          path: AppPackages/**/*.msix

      - name: Upload publish output
        uses: actions/upload-artifact@v7
        with:
          name: publish-${{ matrix.platform }}
          path: HoobiBitwardenCommandPaletteExtension/bin/Release/**/publish/

  wack:
    needs: [build]
    runs-on: windows-latest
    steps:
      - name: Download x64 MSIX
        uses: actions/download-artifact@v8
        with:
          name: msix-x64
          path: msix

      - name: Run Windows App Certification Kit
        shell: pwsh
        run: |
          $appCert = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\App Certification Kit" -Filter appcert.exe -Recurse | 
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $appCert) { 
            Write-Host "##[warning]WACK not found, skipping"
            exit 0 
          }
          $msix = Get-ChildItem msix -Recurse -Filter *.msix | Select-Object -First 1 -ExpandProperty FullName
          $reportPath = Join-Path $PWD "wack-report.xml"
          Write-Host "Running WACK on: $msix"
          Write-Host "Report will be saved to: $reportPath"
          & $appCert test -apptype windowspackagedapp -appxpackagepath $msix -reportoutputpath $reportPath
          if ($LASTEXITCODE -ne 0) {
            Write-Host "##[error]WACK failed with exit code $LASTEXITCODE"
            exit 1
          }

      - name: Upload WACK report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: wack-report
          path: wack-report.xml

  release:
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: write
    steps:
      - name: Download x64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: msix-x64
          path: release/x64

      - name: Download ARM64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: msix-ARM64
          path: release/ARM64

      - name: Attest MSIX packages
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "release/**/*.msix"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            release/**/*.msix

  pre-release:
    needs: [release-please, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.release-please.outputs.release_created != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get next version from release PR
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find open release-please PR
          PR_TITLE=$(gh pr list \
            --repo ${{ github.repository }} \
            --state open \
            --head "release-please--branches--main" \
            --json title \
            --jq '.[0].title')

          if [ -n "$PR_TITLE" ]; then
            # Extract version from "chore(main): release X.Y.Z"
            VERSION=$(echo "$PR_TITLE" | grep -oP '(?<=release )\d+\.\d+\.\d+')
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Found next version from PR: $VERSION"
          else
            # Fallback to version.txt if no PR exists
            VERSION=$(cat version.txt)
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "No release PR found, using version.txt: $VERSION"
          fi

      - name: Generate release notes
        id: notes
        run: |
          VERSION_PREFIX="v${{ steps.version.outputs.version }}-pre."
          # Find the most recent pre-release tag for this version, or fall back to last stable tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -m1 "^${VERSION_PREFIX}" || true)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git tag --sort=-version:refname | grep -m1 '^v[0-9]' || true)
          fi
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          # Write to file to safely handle multi-line output
          echo "$NOTES" > /tmp/release_notes.txt
          echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"

      - name: Download x64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: msix-x64
          path: release/x64

      - name: Download ARM64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: msix-ARM64
          path: release/ARM64

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-pre.${{ github.run_number }}
          name: v${{ steps.version.outputs.version }}-pre.${{ github.run_number }}
          prerelease: true
          make_latest: false
          body_path: /tmp/release_notes.txt
          files: |
            release/**/*.msix

      - name: Prune old pre-releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP: 3
        run: |
          VERSION_PREFIX="v${{ steps.version.outputs.version }}-pre."
          # List all pre-releases matching current version prefix, sorted newest first
          RELEASES=$(gh release list \
            --repo ${{ github.repository }} \
            --limit 100 \
            --json tagName,isPrerelease \
            --jq "[.[] | select(.isPrerelease == true and (.tagName | startswith(\"$VERSION_PREFIX\")))] | sort_by(.tagName) | reverse | .[${KEEP}:] | .[].tagName")
          for TAG in $RELEASES; do
            echo "Deleting old pre-release: $TAG"
            gh release delete "$TAG" --repo ${{ github.repository }} --yes --cleanup-tag
          done
