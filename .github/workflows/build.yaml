name: Build & Release

on:
  push:
    branches: [main, dev]
    paths:
      - "**.cs"
      - "**.csproj"
      - "*.props"
      - "*.targets"
      - ".editorconfig"
      - "**/Package.appxmanifest"
      - "version.txt"
      - ".github/workflows/build.yaml"
      - "release-please-config.json"
      - ".release-please-manifest.json"
  pull_request:
    branches: [main]
    paths:
      - "**.cs"
      - "**.csproj"
      - "*.props"
      - "*.targets"
      - ".editorconfig"
      - "**/Package.appxmanifest"
      - "version.txt"
      - ".github/workflows/build.yaml"
      - "release-please-config.json"
      - ".release-please-manifest.json"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GH_PAT }}

  lint-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore -p:Platform=x64

      - name: Lint (build with TreatWarningsAsErrors)
        run: dotnet build -c Release -p:Platform=x64 --no-restore

      - name: Test with coverage
        run: >-
          dotnet test -p:Platform=x64 --no-build -c Release
          --collect:"XPlat Code Coverage"
          --results-directory ${{ github.workspace }}/coverage

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: ${{ github.workspace }}/coverage/**/coverage.cobertura.xml
          targetdir: ${{ github.workspace }}/coverage/report
          reporttypes: HtmlInline;Cobertura;MarkdownSummaryGithub

      - name: Publish coverage summary to job
        run: |
          $summary = Get-Content "${{ github.workspace }}/coverage/report/SummaryGithub.md" -Raw
          $summary | Out-File -Append $env:GITHUB_STEP_SUMMARY
        shell: pwsh

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ${{ github.workspace }}/coverage/report/

      - name: Enforce coverage threshold on changed files
        if: github.event_name == 'pull_request'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Patterns excluded from threshold — defined in .github/coverage-exclusions.json
          $exclusions = Get-Content "${{ github.workspace }}/.github/coverage-exclusions.json" | ConvertFrom-Json
          $excludeFromThreshold = $exclusions | Select-Object -ExpandProperty pattern

          $changedFiles = git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.cs' |
            Where-Object { $_ -notmatch '\.Tests[\\/]' } |
            ForEach-Object { (Resolve-Path $_).Path }

          if (-not $changedFiles) {
            Write-Host "No C# source files changed in this PR, skipping coverage check"
            exit 0
          }

          [xml]$cobertura = Get-Content "${{ github.workspace }}/coverage/report/Cobertura.xml"
          $fileMap = @{}

          foreach ($pkg in $cobertura.coverage.packages.package) {
            foreach ($cls in $pkg.classes.class) {
              $file = $cls.filename
              if ($changedFiles | Where-Object { $file -eq $_ }) {
                $rel = ($file -replace [regex]::Escape("${{ github.workspace }}$([IO.Path]::DirectorySeparatorChar)"), '')
                if (-not $fileMap.ContainsKey($rel)) { $fileMap[$rel] = @{ Covered=0; Total=0 } }
                foreach ($line in $cls.lines.line) {
                  $fileMap[$rel].Total++
                  if ([int]$line.hits -gt 0) { $fileMap[$rel].Covered++ }
                }
              }
            }
          }

          if ($fileMap.Count -eq 0) {
            Write-Host "No coverable lines found in changed files, skipping"
            exit 0
          }

          # Build per-file stats — capture $fileKey before nesting to avoid $_ rebinding
          $fileStats = $fileMap.GetEnumerator() | ForEach-Object {
            $pct = if ($_.Value.Total -gt 0) { [math]::Round(($_.Value.Covered / $_.Value.Total) * 100, 1) } else { 0 }
            $fileKey = $_.Key
            $matchedExclusion = $exclusions | Where-Object { $fileKey -match $_.pattern } | Select-Object -First 1
            [pscustomobject]@{ File=$_.Key; Covered=$_.Value.Covered; Total=$_.Value.Total; Pct=$pct; Excluded=($null -ne $matchedExclusion); Reason=$matchedExclusion.reason }
          }

          # Calculate threshold only on non-excluded files
          $thresholdFiles = $fileStats | Where-Object { -not $_.Excluded }
          $thresholdTotal = ($thresholdFiles | Measure-Object -Property Total -Sum).Sum
          $thresholdCovered = ($thresholdFiles | Measure-Object -Property Covered -Sum).Sum
          $thresholdPct = if ($thresholdTotal -gt 0) { [math]::Round(($thresholdCovered / $thresholdTotal) * 100, 2) } else { 100 }

          $allTotal = ($fileStats | Measure-Object -Property Total -Sum).Sum
          $allCovered = ($fileStats | Measure-Object -Property Covered -Sum).Sum
          $allPct = if ($allTotal -gt 0) { [math]::Round(($allCovered / $allTotal) * 100, 2) } else { 100 }
          $threshold = 50

          $repoUrl = "https://github.com/${{ github.repository }}"
          $headSha = "${{ github.event.pull_request.head.sha }}"

          # Build PR comment
          $icon = if ($thresholdPct -ge $threshold) { ':white_check_mark:' } else { ':x:' }
          $body = "## $icon Code Coverage — Changed Files`n`n"
          $body += "| Coverage | Lines | File |`n|---|---|---|`n"
          foreach ($f in $fileStats | Sort-Object { if ($_.Excluded) { -1 } else { $_.Pct } } -Descending) {
            # Display last 2 path segments: SubDir\File.cs
            $parts = $f.File -split '[/\\]'
            $displayName = ($parts | Select-Object -Last 2) -join '\'
            $urlPath = $f.File -replace '\\', '/'
            $fileLink = "[$displayName]($repoUrl/blob/$headSha/$urlPath)"
            if ($f.Excluded) {
              $body += "| :warning: Excluded | $($f.Covered)/$($f.Total) | $fileLink — *$($f.Reason)* |`n"
            } else {
              $bar = if ($f.Pct -ge 80) { ':green_circle:' } elseif ($f.Pct -ge 50) { ':yellow_circle:' } else { ':red_circle:' }
              $body += "| $bar $($f.Pct)% | $($f.Covered)/$($f.Total) | $fileLink |`n"
            }
          }
          $body += "`n**Testable: $thresholdPct%** ($thresholdCovered/$thresholdTotal lines, threshold: $threshold%)"
          if ($thresholdTotal -ne $allTotal) { $body += " | Overall: $allPct% ($allCovered/$allTotal)" }
          $body += "`n<!-- coverage-bot -->"

          # Upsert comment: find existing bot comment or create new
          $prNumber = "${{ github.event.pull_request.number }}"
          $existing = gh api "repos/${{ github.repository }}/issues/$prNumber/comments" --paginate --jq '.[] | select(.body | contains("<!-- coverage-bot -->")) | .id' 2>$null | Select-Object -First 1
          if ($existing) {
            gh api --method PATCH "repos/${{ github.repository }}/issues/comments/$existing" -f body=$body | Out-Null
            Write-Host "Updated existing coverage comment"
          } else {
            gh pr comment $prNumber --body $body
            Write-Host "Created coverage comment"
          }

          Write-Host "Testable coverage: $thresholdPct% ($thresholdCovered/$thresholdTotal lines, threshold: $threshold%)"
          if ($thresholdPct -lt $threshold) {
            Write-Host "::error::Coverage on testable changed files ($thresholdPct%) is below the $threshold% threshold"
            exit 1
          }

  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64, ARM64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content version.txt -Raw).Trim()
          "APP_VERSION=$ver.0" | Out-File -Append $env:GITHUB_ENV
          "version=$ver" | Out-File -Append $env:GITHUB_OUTPUT

      - name: Stamp Package.appxmanifest version
        shell: pwsh
        run: |
          $manifest = Resolve-Path "HoobiBitwardenCommandPaletteExtension\Package.appxmanifest"
          $content = [System.IO.File]::ReadAllText($manifest)
          $content = $content -creplace '(?<=<Identity\s[^>]*)Version="[\d.]+"', "Version=`"$env:APP_VERSION`""
          [System.IO.File]::WriteAllText($manifest, $content, [System.Text.UTF8Encoding]::new($false))

      - name: Restore
        run: dotnet restore -p:Platform=${{ matrix.platform }}

      - name: Build
        run: dotnet build -c Release -p:Platform=${{ matrix.platform }} --no-restore

      - name: Create MSIX package
        run: |
          dotnet publish -c Release -p:Platform=${{ matrix.platform }} `
            -p:AppxPackageDir=${{ github.workspace }}\AppPackages\ `
            -p:GenerateAppxPackageOnBuild=true `
            -p:AppxBundle=Never
        working-directory: HoobiBitwardenCommandPaletteExtension

      - name: Find produced MSIX (diagnostic)
        shell: pwsh
        run: |
          $found = Get-ChildItem -Path "${{ github.workspace }}" -Recurse -Filter *.msix -ErrorAction SilentlyContinue
          if ($found) {
            Write-Host "Found MSIX file(s):"
            $found | ForEach-Object { Write-Host "  $($_.FullName)" }
          } else {
            Write-Host "::warning::No .msix files found anywhere in workspace after publish"
          }

      - name: Import signing certificate
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $pfxBytes = [Convert]::FromBase64String("${{ secrets.SIGNING_CERTIFICATE }}")
          $pfxPath = Join-Path $env:RUNNER_TEMP "signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
          $pwd = ConvertTo-SecureString "${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}" -AsPlainText -Force
          Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $pwd
          Remove-Item $pfxPath

      - name: Sign MSIX package
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match 'x64\\signtool' } |
            Sort-Object { [version]($_.FullName -replace '.*\\(\d+\.\d+\.\d+\.\d+)\\.*','$1') } -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          Get-ChildItem "${{ github.workspace }}\AppPackages" -Recurse -Filter *.msix | ForEach-Object {
            & $signtool sign /fd SHA256 /sha1 "${{ vars.SIGNING_CERT_THUMBPRINT }}" /td SHA256 $_.FullName
            if ($LASTEXITCODE -ne 0) { throw "Signing failed for $($_.Name)" }
          }

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: msix-${{ matrix.platform }}
          path: "**/*.msix"

      - name: Upload publish output
        uses: actions/upload-artifact@v7
        with:
          name: publish-${{ matrix.platform }}
          path: HoobiBitwardenCommandPaletteExtension/bin/Release/**/publish/

  wack:
    needs: [build]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, ARM64]
    steps:
      - name: Checkout (for wack-exclusions.json)
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github/wack-exclusions.json
          sparse-checkout-cone-mode: false

      - name: Download ${{ matrix.platform }} MSIX
        uses: actions/download-artifact@v8
        with:
          name: msix-${{ matrix.platform }}
          path: msix

      - name: Run Windows App Certification Kit
        shell: pwsh
        run: |
          # WACK can test any package architecture regardless of its own bitness,
          # so both x64 and ARM64 packages are tested on the windows-latest x64 runner.
          $appCert = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\App Certification Kit' `
            -Filter appcert.exe -Recurse -ErrorAction SilentlyContinue |
            Select-Object -First 1 -ExpandProperty FullName
          Write-Host "Using appcert: $appCert"
          if (-not $appCert) {
            Write-Host "##[warning]WACK not found, skipping"
            exit 0
          }
          $msix = Get-ChildItem msix -Recurse -Filter *.msix | Select-Object -First 1 -ExpandProperty FullName
          if (-not $msix) {
            Write-Host "::error::No .msix found under msix/ — listing directory contents for diagnosis:"
            Get-ChildItem msix -Recurse | ForEach-Object { Write-Host "  $($_.FullName)" }
            exit 1
          }
          $reportPath = Join-Path $PWD "wack-report.xml"
          Write-Host "Running WACK on: $msix"
          Write-Host "Report will be saved to: $reportPath"
          # Exit code is handled by the post-step after applying exclusions; don't fail here.
          # Disable native-command error propagation so appcert's non-zero exit doesn't terminate the step.
          $PSNativeCommandErrorActionPreference = $false
          & $appCert test -apptype windowspackagedapp -appxpackagepath $msix -reportoutputpath $reportPath
          Write-Host "appcert exited with code $LASTEXITCODE"
          exit 0

      - name: Upload WACK report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: wack-report-${{ matrix.platform }}
          path: wack-report.xml

      - name: Fail on non-excluded WACK failures (non-PR)
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          $reportPath = "wack-report.xml"
          if (-not (Test-Path $reportPath)) { exit 0 }

          $exclusionMap = @{}
          $exclusionsPath = ".github/wack-exclusions.json"
          if (Test-Path $exclusionsPath) {
            (Get-Content $exclusionsPath | ConvertFrom-Json) | ForEach-Object { $exclusionMap[$_.test] = $_.reason }
          }

          [xml]$report = Get-Content $reportPath
          $realFailures = @($report.SelectNodes("//TEST") |
            Where-Object { $_.SelectSingleNode("RESULT").InnerText.Trim() -eq 'FAIL' } |
            Where-Object { -not $exclusionMap.ContainsKey($_.GetAttribute("NAME")) })

          if ($realFailures.Count -gt 0) {
            Write-Host "::error::$($realFailures.Count) non-excluded WACK test(s) failed: $(($realFailures | ForEach-Object { $_.GetAttribute('NAME') }) -join ', ')"
            exit 1
          }

      - name: Post WACK results to PR
        if: always() && github.event_name == 'pull_request'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $reportPath = "wack-report.xml"
          $prNumber = "${{ github.event.pull_request.number }}"
          $platform = "${{ matrix.platform }}"
          $marker = "<!-- wack-bot-$platform -->"

          if (-not (Test-Path $reportPath)) {
            $body = "## :warning: WACK Results ($platform)`n`nWACK report was not generated (tool may not be available on runner).`n$marker"
          } else {
            # Load exclusions — map test name -> reason
            $exclusionMap = @{}
            $exclusionsPath = ".github/wack-exclusions.json"
            if (Test-Path $exclusionsPath) {
              (Get-Content $exclusionsPath | ConvertFrom-Json) | ForEach-Object { $exclusionMap[$_.test] = $_.reason }
            }

            [xml]$report = Get-Content $reportPath
            # Use OVERALL_RESULT attribute and XPath+InnerText to reliably read CDATA result nodes
            $tests = $report.SelectNodes("//TEST")
            $passed   = @($tests | Where-Object { $_.SelectSingleNode("RESULT").InnerText.Trim() -eq 'PASS' })
            $failed   = @($tests | Where-Object { $_.SelectSingleNode("RESULT").InnerText.Trim() -eq 'FAIL' })
            $skipped  = @($tests | Where-Object { $_.SelectSingleNode("RESULT").InnerText.Trim() -eq 'NOT_APPLICABLE' })

            $excluded    = @($failed | Where-Object { $exclusionMap.ContainsKey($_.GetAttribute("NAME")) })
            $realFailures = @($failed | Where-Object { -not $exclusionMap.ContainsKey($_.GetAttribute("NAME")) })

            $icon = if ($realFailures.Count -eq 0) { ':white_check_mark:' } else { ':x:' }
            $body = "## $icon WACK Results ($platform)`n`n"
            $body += ":green_circle: **$($passed.Count) passed** "
            if ($realFailures.Count -gt 0) { $body += ":red_circle: **$($realFailures.Count) failed** " }
            if ($excluded.Count -gt 0)     { $body += ":warning: **$($excluded.Count) excluded** " }
            if ($skipped.Count -gt 0)      { $body += ":white_circle: **$($skipped.Count) N/A** " }
            $body += "`n`n"

            if ($realFailures.Count -gt 0) {
              $body += "### Failed Tests`n| Test | Message |`n|---|---|`n"
              foreach ($t in $realFailures) {
                $name = $t.GetAttribute("NAME")
                $msgs = @($t.SelectNodes("MESSAGES/MESSAGE")) | ForEach-Object { $_.GetAttribute("TEXT") }
                $detail = ($msgs -join '; ') -replace '[\r\n]+', ' '
                if ($detail.Length -gt 200) { $detail = $detail.Substring(0, 200) + '...' }
                if (-not $detail) { $detail = $t.GetAttribute("DESCRIPTION") }
                $body += "| ``$name`` | $detail |`n"
              }
              $body += "`n"
            }

            if ($excluded.Count -gt 0) {
              $body += "### Excluded Tests`n| Test | Message | Reason |`n|---|---|---|`n"
              foreach ($t in $excluded) {
                $name = $t.GetAttribute("NAME")
                $msgs = @($t.SelectNodes("MESSAGES/MESSAGE")) | ForEach-Object { $_.GetAttribute("TEXT") }
                $detail = ($msgs -join '; ') -replace '[\r\n]+', ' '
                if ($detail.Length -gt 200) { $detail = $detail.Substring(0, 200) + '...' }
                if (-not $detail) { $detail = $t.GetAttribute("DESCRIPTION") }
                $reason = $exclusionMap[$name]
                $body += "| ``$name`` | $detail | $reason |`n"
              }
              $body += "`n"
            }

            $body += "<details><summary>All tests</summary>`n`n"
            $body += "| Test | Result |`n|---|---|`n"
            foreach ($t in $tests | Sort-Object { $_.SelectSingleNode("RESULT").InnerText.Trim() }) {
              $name   = $t.GetAttribute('NAME')
              $result = $t.SelectSingleNode("RESULT").InnerText.Trim()
              $r = if ($result -eq 'PASS') { ':green_circle: Pass' }
                   elseif ($result -eq 'FAIL' -and $exclusionMap.ContainsKey($name)) { ':warning: Excluded' }
                   elseif ($result -eq 'FAIL') { ':red_circle: Fail' }
                   else { ':white_circle: N/A' }
              $body += "| ``$name`` | $r |`n"
            }
            $body += "`n</details>`n"
            $body += $marker

            if ($realFailures.Count -gt 0) {
              Write-Host "::error::$($realFailures.Count) non-excluded WACK test(s) failed: $(($realFailures | ForEach-Object { $_.GetAttribute('NAME') }) -join ', ')"
              # Upsert comment before exiting with failure
            }
          }

          # Use ConvertFrom-Json + PowerShell filtering to avoid jq escaping issues
          $comments = gh api "repos/${{ github.repository }}/issues/$prNumber/comments" --paginate | ConvertFrom-Json
          $existing = $comments | Where-Object { $_.body -like "*$marker*" } | Select-Object -First 1 -ExpandProperty id
          if ($existing) {
            gh api --method PATCH "repos/${{ github.repository }}/issues/comments/$existing" -f body=$body | Out-Null
            Write-Host "Updated existing WACK comment ($platform)"
          } else {
            gh pr comment $prNumber --body $body --repo "${{ github.repository }}"
            Write-Host "Created WACK comment ($platform)"
          }

          if ($realFailures -and $realFailures.Count -gt 0) { exit 1 }

  release:
    needs: [release-please, build, lint-and-test, wack]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: write
    steps:
      - name: Download x64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: msix-x64
          path: release/x64

      - name: Download ARM64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: msix-ARM64
          path: release/ARM64

      - name: Attest MSIX packages
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "release/**/*.msix"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            release/**/*.msix

      - name: Append trust signal to release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          ID=$(gh api "repos/${{ github.repository }}/releases/tags/$TAG" --jq '.id')
          BODY=$(gh api "repos/${{ github.repository }}/releases/tags/$TAG" --jq '.body // ""')
          TRUST=$'\n\n---\n> \u2705 WACK certified (x64) \u00b7 \U0001F512 [CodeQL scanned](https://github.com/${{ github.repository }}/actions/workflows/codeql.yml)'
          jq -n --arg body "${BODY}${TRUST}" '{body: $body}' \
            | gh api --method PATCH "repos/${{ github.repository }}/releases/$ID" --input -

  pre-release:
    needs: [release-please, build, lint-and-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.release-please.outputs.release_created != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get next version from release PR
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find open release-please PR
          PR_TITLE=$(gh pr list \
            --repo ${{ github.repository }} \
            --state open \
            --head "release-please--branches--main" \
            --json title \
            --jq '.[0].title')

          if [ -n "$PR_TITLE" ]; then
            # Extract version from "chore(main): release X.Y.Z"
            VERSION=$(echo "$PR_TITLE" | grep -oP '(?<=release )\d+\.\d+\.\d+')
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Found next version from PR: $VERSION"
          else
            # Fallback to version.txt if no PR exists
            VERSION=$(cat version.txt)
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "No release PR found, using version.txt: $VERSION"
          fi

      - name: Generate release notes
        id: notes
        run: |
          VERSION_PREFIX="v${{ steps.version.outputs.version }}-pre."
          # Find the most recent pre-release tag for this version, or fall back to last stable tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -m1 "^${VERSION_PREFIX}" || true)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git tag --sort=-version:refname | grep -m1 '^v[0-9]' || true)
          fi
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          # Write to file to safely handle multi-line output
          echo "$NOTES" > /tmp/release_notes.txt
          echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"

      - name: Download x64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: msix-x64
          path: release/x64

      - name: Download ARM64 artifacts
        uses: actions/download-artifact@v8
        with:
          name: msix-ARM64
          path: release/ARM64

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-pre.${{ github.run_number }}
          name: v${{ steps.version.outputs.version }}-pre.${{ github.run_number }}
          prerelease: true
          make_latest: false
          body_path: /tmp/release_notes.txt
          files: |
            release/**/*.msix

      - name: Prune old pre-releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP: 3
        run: |
          VERSION_PREFIX="v${{ steps.version.outputs.version }}-pre."
          # List all pre-releases matching current version prefix, sorted newest first
          RELEASES=$(gh release list \
            --repo ${{ github.repository }} \
            --limit 100 \
            --json tagName,isPrerelease \
            --jq "[.[] | select(.isPrerelease == true and (.tagName | startswith(\"$VERSION_PREFIX\")))] | sort_by(.tagName) | reverse | .[${KEEP}:] | .[].tagName")
          for TAG in $RELEASES; do
            echo "Deleting old pre-release: $TAG"
            gh release delete "$TAG" --repo ${{ github.repository }} --yes --cleanup-tag
          done
